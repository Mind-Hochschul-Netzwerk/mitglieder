<!-- 3b -->
  <div class="dv-opt" id="3b">
    <div class="dv-olabel"><a class="dv-oid" href="#3b">3b</a>Zwei Spalten: Mitglieder / Verwalter*innen</div>
    <div style="width:700px;background:#f6f7f9;border-radius:10px;box-shadow:0 1px 3px rgba(20,28,45,.08),0 10px 30px rgba(20,28,45,.06);padding:26px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;">
        <div>
          <div style="font-size:12px;color:#9aa0ad;margin-bottom:6px;"><a style="color:#9aa0ad;text-decoration:none;" href="#">Gruppen</a> / Teams</div>
          <h1 style="margin:0;font-size:22px;font-weight:700;color:#1c2433;letter-spacing:-.01em;">Aufnahmekommission</h1>
          <div style="margin-top:7px;font-size:13px;color:#8a90a0;max-width:460px;line-height:1.5;">Die Aufnahmekommission entscheidet auf Grundlage der Aufnahmeordnung über Mitgliedsanträge.</div>
        </div>
        <div style="display:flex;gap:8px;flex:none;">
          <button style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:7px;border:1px solid #e0e3e8;background:#fff;color:#5a6273;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;"><i class="ti ti-user-minus"></i> Verlassen</button>
          <button style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:7px;border:1px solid #2f5fa6;background:#2f5fa6;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;"><i class="ti ti-settings"></i> Einstellungen</button>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div style="background:#fff;border:1px solid #e6e8ec;border-radius:9px;padding:16px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <i class="ti ti-users" style="color:#9aa0ad;"></i>
            <h2 style="margin:0;font-size:12.5px;font-weight:600;color:#1c2433;">Mitglieder</h2>
            <span style="font-size:11px;color:#aab0bb;background:#f1f3f6;padding:1px 7px;border-radius:99px;">{{ detailMemberCount }}</span>
          </div>
          <div style="display:flex;flex-direction:column;">
            <sc-for list="{{ detailMembers }}" as="m" hint-placeholder-count="2">
              <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid #f0f2f5;">
                <a href="#" style="flex:1;min-width:0;font-size:13px;font-weight:500;color:#1c2433;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ m.name }}</a>
                <button title="Entfernen" style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;border:none;background:none;color:#c2c7d0;cursor:pointer;flex:none;"><i class="ti ti-x"></i></button>
              </div>
            </sc-for>
          </div>
          <div style="display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid #f0f2f5;">
            <input placeholder="Hinzufügen…" style="flex:1;min-width:0;border:1px solid #e0e3e8;border-radius:6px;padding:6px 9px;font-size:12.5px;font-family:inherit;outline:none;">
            <button style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:1px solid #e0e3e8;background:#fff;color:#5a6273;cursor:pointer;flex:none;"><i class="ti ti-plus"></i></button>
          </div>
        </div>

        <div style="background:#fff;border:1px solid #e6e8ec;border-radius:9px;padding:16px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <i class="ti ti-crown" style="color:#9aa0ad;"></i>
            <h2 style="margin:0;font-size:12.5px;font-weight:600;color:#1c2433;">Gruppenverwalter*innen</h2>
            <span style="font-size:11px;color:#aab0bb;background:#f1f3f6;padding:1px 7px;border-radius:99px;">{{ detailOwnerCount }}</span>
          </div>
          <div style="display:flex;flex-direction:column;">
            <sc-for list="{{ detailOwners }}" as="o" hint-placeholder-count="1">
              <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid #f0f2f5;">
                <a href="#" style="flex:1;min-width:0;font-size:13px;font-weight:500;color:#1c2433;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ o.name }}</a>
                <button title="Entfernen" style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;border:none;background:none;color:#c2c7d0;cursor:pointer;flex:none;"><i class="ti ti-x"></i></button>
              </div>
            </sc-for>
          </div>
          <div style="display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid #f0f2f5;">
            <input placeholder="Hinzufügen…" style="flex:1;min-width:0;border:1px solid #e0e3e8;border-radius:6px;padding:6px 9px;font-size:12.5px;font-family:inherit;outline:none;">
            <button style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:1px solid #e0e3e8;background:#fff;color:#5a6273;cursor:pointer;flex:none;"><i class="ti ti-plus"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
